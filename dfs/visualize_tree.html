<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>DFS Crawler — Tree Visualizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08111f;color:#c9d8f0;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;min-height:100vh;display:flex;flex-direction:column}
header{padding:16px 24px;border-bottom:1px solid #1a2e4a;display:flex;align-items:baseline;gap:12px}
header .tag{font-size:10px;color:#3b82f6;letter-spacing:.15em;text-transform:uppercase}
header h1{font-size:18px;font-weight:700;color:#e2eeff}
#load{padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:14px}
#load p{font-size:12px;color:#64748b;text-align:center;line-height:1.7}
label.btn{display:inline-block;padding:9px 22px;background:#1e3a5f;border:1px solid #3b82f6;border-radius:7px;color:#93c5fd;cursor:pointer;font-size:12px;font-family:inherit;transition:background .15s}
label.btn:hover{background:#1d4ed8;color:#fff}
input[type=file]{display:none}
#stats{display:flex;gap:8px;padding:10px 20px;border-bottom:1px solid #1a2e4a;flex-wrap:wrap;display:none}
.stat{background:#0f1e30;border:1px solid #1a2e4a;border-radius:6px;padding:6px 12px}
.stat-label{font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase}
.stat-val{font-size:16px;font-weight:700}
#wrap{flex:1;overflow:auto;padding:24px}
svg{display:block}
#tip{position:fixed;pointer-events:none;background:#0f1e30;border:1px solid #1e3a5f;border-radius:8px;padding:10px 14px;font-size:11px;max-width:360px;line-height:1.6;color:#94a3b8;display:none;z-index:100}
#tip .tu{color:#60a5fa;font-weight:600;word-break:break-all;margin-bottom:4px}
#tip .ts{color:#64748b;margin-top:4px;font-size:10px}
</style>
</head>
<body>
<header>
  <span class="tag">DFS Crawler</span>
  <h1>Tree Visualizer</h1>
</header>

<div id="load">
  <p>Load a <code style="color:#fbbf24;background:#1c1003;padding:1px 5px;border-radius:3px">crawl_tree.json</code> file generated by the tracker.</p>
  <label class="btn">Load crawl_tree.json<input type="file" id="fi" accept=".json"/></label>
</div>

<div id="stats"></div>
<div id="wrap"></div>
<div id="tip"></div>

<script>
// ── constants ─────────────────────────────────────────────
const NODE_R  = 26;
const V_GAP   = 110;   // vertical gap between depth levels
const H_GAP   = 20;    // minimum horizontal gap between sibling subtrees
const PAD_X   = 60;    // left/right canvas padding
const PAD_Y   = 50;    // top/bottom canvas padding

const C = {
  ok:    { fill:"#052e16", stroke:"#10b981", text:"#34d399" },
  error: { fill:"#2d0a0a", stroke:"#ef4444", text:"#fca5a5" },
  edge:  "#10b981",
  edgeDim: "#1e3a5f",
};

// ── layout engine ─────────────────────────────────────────
// Computes _x, _y for every node using a bottom-up width calculation.
// Each leaf gets width = NODE_R*2.
// Each internal node gets width = sum(children widths) + H_GAP*(n-1).
// Node _x is centred over its subtree.

function computeLayout(node, depth, xOffset) {
  node._y = PAD_Y + depth * V_GAP;

  if (!node.children || node.children.length === 0) {
    node._subtreeW = NODE_R * 2;
    node._x = xOffset + NODE_R;
    return node._subtreeW;
  }

  let x = xOffset;
  let totalW = 0;
  node.children.forEach((child, i) => {
    const w = computeLayout(child, depth + 1, x);
    x += w + (i < node.children.length - 1 ? H_GAP : 0);
    totalW += w + (i < node.children.length - 1 ? H_GAP : 0);
  });

  node._subtreeW = Math.max(totalW, NODE_R * 2);
  const firstX = node.children[0]._x;
  const lastX  = node.children[node.children.length - 1]._x;
  node._x = (firstX + lastX) / 2;
  return node._subtreeW;
}

function flatten(node, out = []) {
  out.push(node);
  (node.children || []).forEach(c => flatten(c, out));
  return out;
}

function collectEdges(node, out = []) {
  (node.children || []).forEach(c => {
    out.push({ from: node, to: c });
    collectEdges(c, out);
  });
  return out;
}

function shortLabel(url) {
  const parts = url.replace(/https?:\/\/[^/]+/, "").split("/").filter(Boolean);
  return parts[parts.length - 1] || "root";
}

// ── render ────────────────────────────────────────────────
function render(tree) {
  const totalW = computeLayout(tree, 0, PAD_X) + PAD_X * 2;
  const allNodes = flatten(tree);
  const edges    = collectEdges(tree);
  const maxDepth = Math.max(...allNodes.map(n => n.depth));
  const svgH     = PAD_Y * 2 + (maxDepth + 1) * V_GAP;

  // stats
  const statsEl = document.getElementById("stats");
  statsEl.style.display = "flex";
  const errors = allNodes.filter(n => n.status === "error").length;
  statsEl.innerHTML = [
    ["Pages",        allNodes.length, "#60a5fa"],
    ["Max depth",    maxDepth,        "#818cf8"],
    ["Errors",       errors,          errors ? "#f87171" : "#475569"],
  ].map(([l,v,c]) => `<div class="stat"><div class="stat-label">${l}</div><div class="stat-val" style="color:${c}">${v}</div></div>`).join("");

  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("width", Math.max(totalW, 300));
  svg.setAttribute("height", svgH);

  // depth labels
  for (let d = 0; d <= maxDepth; d++) {
    const t = document.createElementNS(NS, "text");
    t.setAttribute("x", 10);
    t.setAttribute("y", PAD_Y + d * V_GAP + 5);
    t.setAttribute("fill", "#1e3a5f");
    t.setAttribute("font-size", 10);
    t.setAttribute("font-family", "monospace");
    t.textContent = `d${d}`;
    svg.appendChild(t);
  }

  const tip = document.getElementById("tip");

  // edges
  edges.forEach(e => {
    const line = document.createElementNS(NS, "line");
    line.setAttribute("x1", e.from._x);
    line.setAttribute("y1", e.from._y + NODE_R);
    line.setAttribute("x2", e.to._x);
    line.setAttribute("y2", e.to._y - NODE_R);
    line.setAttribute("stroke", e.from.status === "ok" && e.to.status === "ok" ? C.edge : C.edgeDim);
    line.setAttribute("stroke-width", 1.2);
    line.setAttribute("stroke-opacity", 0.5);
    svg.appendChild(line);
  });

  // nodes
  allNodes.forEach(node => {
    const col = C[node.status] || C.ok;
    const g   = document.createElementNS(NS, "g");
    g.style.cursor = "pointer";

    // glow ring
    const ring = document.createElementNS(NS, "circle");
    ring.setAttribute("cx", node._x); ring.setAttribute("cy", node._y);
    ring.setAttribute("r", NODE_R + 5);
    ring.setAttribute("fill", "none");
    ring.setAttribute("stroke", col.stroke);
    ring.setAttribute("stroke-width", 0.5);
    ring.setAttribute("stroke-opacity", 0.2);
    g.appendChild(ring);

    // main circle
    const circ = document.createElementNS(NS, "circle");
    circ.setAttribute("cx", node._x); circ.setAttribute("cy", node._y);
    circ.setAttribute("r", NODE_R);
    circ.setAttribute("fill", col.fill);
    circ.setAttribute("stroke", col.stroke);
    circ.setAttribute("stroke-width", 1.8);
    g.appendChild(circ);

    // depth label
    const dt = document.createElementNS(NS, "text");
    dt.setAttribute("x", node._x); dt.setAttribute("y", node._y - 6);
    dt.setAttribute("text-anchor", "middle");
    dt.setAttribute("dominant-baseline", "central");
    dt.setAttribute("fill", col.text);
    dt.setAttribute("font-size", 10);
    dt.setAttribute("font-weight", "700");
    dt.setAttribute("font-family", "monospace");
    dt.textContent = `d${node.depth}`;
    g.appendChild(dt);

    // child count
    const cc = document.createElementNS(NS, "text");
    cc.setAttribute("x", node._x); cc.setAttribute("y", node._y + 9);
    cc.setAttribute("text-anchor", "middle");
    cc.setAttribute("dominant-baseline", "central");
    cc.setAttribute("fill", col.stroke);
    cc.setAttribute("font-size", 9);
    cc.setAttribute("font-family", "monospace");
    cc.textContent = `↓${(node.children || []).length}`;
    g.appendChild(cc);

    // url label below node
    const label = shortLabel(node.url);
    const lt = document.createElementNS(NS, "text");
    lt.setAttribute("x", node._x);
    lt.setAttribute("y", node._y + NODE_R + 15);
    lt.setAttribute("text-anchor", "middle");
    lt.setAttribute("fill", "#334e68");
    lt.setAttribute("font-size", 9);
    lt.setAttribute("font-family", "monospace");
    lt.textContent = label.length > 20 ? label.slice(0, 20) + "…" : label;
    g.appendChild(lt);

    // tooltip
    g.addEventListener("mouseenter", () => {
      tip.style.display = "block";
      tip.innerHTML = `
        <div class="tu">${node.url}</div>
        <div>depth: ${node.depth} &nbsp;|&nbsp; children: ${(node.children||[]).length} &nbsp;|&nbsp; status: ${node.status}</div>
        ${node.sample ? `<div class="ts">${node.sample.slice(0,180)}…</div>` : ""}
        ${node.error  ? `<div style="color:#f87171;margin-top:4px">⚠ ${node.error}</div>` : ""}
      `;
    });
    g.addEventListener("mousemove", e => {
      tip.style.left = (e.clientX + 16) + "px";
      tip.style.top  = (e.clientY - 8)  + "px";
    });
    g.addEventListener("mouseleave", () => { tip.style.display = "none"; });

    svg.appendChild(g);
  });

  const wrap = document.getElementById("wrap");
  wrap.innerHTML = "";
  wrap.appendChild(svg);
  document.getElementById("load").style.display = "none";
}

// ── file input ────────────────────────────────────────────
document.getElementById("fi").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      render(JSON.parse(ev.target.result));
    } catch(err) {
      alert("Invalid JSON: " + err.message);
    }
  };
  reader.readAsText(file);
});
</script>
</body>
</html>
