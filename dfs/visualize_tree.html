<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Crawler Tree Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #08111f;
  color: #c9d8f0;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 18px 28px 14px;
  border-bottom: 1px solid #1a2e4a;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
header h1 { font-size: 17px; font-weight: 600; color: #e2eeff; }
header span { font-size: 11px; color: #3b82f6; letter-spacing: .12em; text-transform: uppercase; }

#load-area {
  padding: 40px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
#load-area p { font-size: 13px; color: #64748b; text-align: center; line-height: 1.7; }

label.file-btn {
  display: inline-block;
  padding: 10px 24px;
  background: #1e3a5f;
  border: 1px solid #3b82f6;
  border-radius: 8px;
  color: #93c5fd;
  cursor: pointer;
  font-size: 13px;
}
label.file-btn:hover { background: #1d4ed8; color: #fff; }

#file-input { display: none; }

#stats {
  display: flex;
  gap: 10px;
  padding: 12px 28px;
  border-bottom: 1px solid #1a2e4a;
  flex-wrap: wrap;
}

.stat {
  background: #0f1e30;
  border: 1px solid #1a2e4a;
  border-radius: 7px;
  padding: 7px 14px;
}
.stat-label { font-size: 9px; color: #475569; letter-spacing: .1em; text-transform: uppercase; }
.stat-val { font-size: 18px; font-weight: 700; }

#canvas-wrap {
  flex: 1;
  overflow: auto;
  padding: 30px;
}
svg { display: block; }

/* Tooltip */
#tip {
  position: fixed;
  pointer-events: auto; /* <-- changed to allow clicking link */
  background: #0f1e30;
  border: 1px solid #1e3a5f;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 11px;
  max-width: 340px;
  line-height: 1.6;
  color: #94a3b8;
  display: none;
  z-index: 100;
}
#tip .tip-url { color: #60a5fa; font-weight: 600; word-break: break-all; margin-bottom: 4px; }
#tip a { color: #3b82f6; text-decoration: underline; }

/* Nodes */
.node-circle {
  cursor: pointer;
  transition: r .15s, filter .15s, stroke-width .15s;
}
</style>
</head>
<body>

<header>
  <span>DFS Crawler</span>
  <h1>Tree Visualizer</h1>
</header>

<div id="load-area">
  <p>
    Run <code style="color:#34d399;background:#052e16;padding:2px 6px;border-radius:4px">python crawler_with_tree.py</code>
    first, then load <code style="color:#fbbf24;background:#1c1003;padding:2px 6px;border-radius:4px">crawl_tree.json</code>.
  </p>
  <label class="file-btn">
    📂 Load crawl_tree.json
    <input type="file" id="file-input" accept=".json"/>
  </label>
</div>

<div id="stats" style="display:none"></div>
<div id="canvas-wrap" style="display:none"></div>
<div id="tip"></div>

<script>
const COLORS = {
  ok: {
    fill: '#0f172a',          // dark inner
    stroke: '#22c55e',        // neon green border
    text: '#4ade80'           // bright green text
  },
  error: {
    fill: '#1e293b',
    stroke: '#ef4444',
    text: '#f87171'
  },
  edgeActive: '#64748b'
};

const NODE_R = 24, H_GAP = 60, V_GAP = 110;

function layout(node, depth = 0, xOffset = 0) {
  const children = node.children || [];
  if (children.length === 0) {
    node._x = xOffset + NODE_R;
    node._y = depth * V_GAP + NODE_R + 20;
    return NODE_R * 2;
  }
  let x = xOffset, totalW = 0;
  for (const child of children) {
    const w = layout(child, depth + 1, x);
    x += w + H_GAP;
    totalW += w + H_GAP;
  }
  totalW -= H_GAP;
  node._x = (children[0]._x + children[children.length - 1]._x) / 2;
  node._y = depth * V_GAP + NODE_R + 20;
  return Math.max(totalW, NODE_R * 2);
}

function flatten(node, out = []) {
  out.push(node);
  for (const c of node.children || []) flatten(c, out);
  return out;
}

function collectEdges(node, out = []) {
  for (const c of node.children || []) {
    out.push({ from: node, to: c });
    collectEdges(c, out);
  }
  return out;
}

function shortUrl(url) {
  return url.replace('https://www.tensorflow.org', '') || '/';
}

function render(tree) {
  const totalW = layout(tree) + 80;
  const allNodes = flatten(tree);
  const edges = collectEdges(tree);
  const maxDepth = Math.max(...allNodes.map(n => n.depth));
  const totalH = (maxDepth + 1) * V_GAP + 80;

  const wrap = document.getElementById('canvas-wrap');
  wrap.style.display = 'block';

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);

  // Edges
  for (const e of edges) {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', e.from._x + 40);
    line.setAttribute('y1', e.from._y + NODE_R);
    line.setAttribute('x2', e.to._x + 40);
    line.setAttribute('y2', e.to._y - NODE_R);
    line.setAttribute('stroke', COLORS.edgeActive);
    line.setAttribute('stroke-width', 1);
    line.setAttribute('stroke-opacity', 0.35);
    svg.appendChild(line);
  }

  const tip = document.getElementById('tip');

  for (const node of allNodes) {
    const cx = node._x + 40;
    const cy = node._y;
    const col = COLORS[node.status] || COLORS.ok;

    const g = document.createElementNS(NS, 'g');
    g.style.cursor = 'pointer'; // clickable group

    const circle = document.createElementNS(NS, 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', NODE_R);
    circle.setAttribute('fill', col.fill);
    circle.setAttribute('stroke', col.stroke);
    circle.setAttribute('stroke-width', 1.5);
    circle.classList.add('node-circle');
    g.appendChild(circle);

    // Depth label (TOP)
const dt = document.createElementNS(NS, 'text');
dt.setAttribute('x', cx);
dt.setAttribute('y', cy - 6);
dt.setAttribute('text-anchor', 'middle');
dt.setAttribute('fill', '#e2e8f0'); // bright for dark bg
dt.setAttribute('font-size', 9);
dt.setAttribute('font-family', 'monospace');
dt.setAttribute('font-weight', '700');
dt.textContent = `d${node.depth}`;
g.appendChild(dt);

// Children count (BOTTOM INSIDE)
const cc = document.createElementNS(NS, 'text');
cc.setAttribute('x', cx);
cc.setAttribute('y', cy + 10);
cc.setAttribute('text-anchor', 'middle');
cc.setAttribute('fill', '#93c5fd');
cc.setAttribute('font-size', 8);
cc.setAttribute('font-family', 'monospace');
cc.textContent = `↓${(node.children||[]).length}`;
g.appendChild(cc);

// URL label (BELOW NODE)
const label = shortUrl(node.url);
const parts = label.split('/').filter(Boolean);
const shortLabel = parts[parts.length - 1] || 'root';

const lt = document.createElementNS(NS, 'text');
lt.setAttribute('x', cx);
lt.setAttribute('y', cy + NODE_R + 14);
lt.setAttribute('text-anchor', 'middle');
lt.setAttribute('fill', '#cbd5f5'); // visible on dark bg
lt.setAttribute('font-size', 9);
lt.setAttribute('font-family', 'monospace');
lt.textContent =
  shortLabel.length > 18 ? shortLabel.slice(0, 18) + '…' : shortLabel;

g.appendChild(lt);

    // CLICK → open URL
    g.addEventListener('click', () => {
      if (node.url) window.open(node.url, '_blank');
    });

    // Hover effect
    g.addEventListener('mouseenter', (e) => {
      circle.setAttribute('stroke-width', 3);
      circle.style.filter = 'brightness(1.2)';

      tip.style.display = 'block';
      tip.innerHTML = `
        <div class="tip-url">${node.url}</div>
        <div>
          depth: ${node.depth} |
          children: ${(node.children||[]).length} |
          status: ${node.status}
        </div>
        <div style="margin-top:6px">
          <a href="${node.url}" target="_blank">Open page ↗</a>
        </div>
        ${node.sample ? `<div style="margin-top:6px;color:#64748b">${node.sample.slice(0,150)}…</div>` : ''}
      `;
    });

    g.addEventListener('mousemove', (e) => {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 10) + 'px';
    });

    g.addEventListener('mouseleave', () => {
      circle.setAttribute('stroke-width', 1.5);
      circle.style.filter = 'none';
      tip.style.display = 'none';
    });

    svg.appendChild(g);
  }

  wrap.innerHTML = '';
  wrap.appendChild(svg);
}

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const tree = JSON.parse(ev.target.result);
    document.getElementById('load-area').style.display = 'none';
    render(tree);
  };
  reader.readAsText(file);
});
</script>
</body>
</html>
